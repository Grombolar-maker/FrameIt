<title>FrameIt — 照片加边框</title>
<style>
:root {
    --bg: #f2f2f6;
    --surface: #ffffff;
    --surface-2: #f8f8fa;
    --text: #1d1d1f;
    --text-2: #86868b;
    --text-3: #aeaeb2;
    --accent: #007aff;
    --accent-hover: #0062cc;
    --border: #e5e5ea;
    --border-radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --transition: 0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    -webkit-font-smoothing: antialiased;
}

/* Header */
.app-header {
    text-align: center;
    margin-bottom: 24px;
    width: 100%;
    max-width: 1000px;
}
.app-header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.3px;
}
.app-header h1 span { color: var(--accent); }
.app-header p {
    font-size: 14px;
    color: var(--text-2);
    margin-top: 4px;
}

/* Main card */
.card {
    background: var(--surface);
    border-radius: 20px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 1000px;
    overflow: hidden;
}

.card-body {
    display: flex;
    flex-direction: column;
    gap: 0;
}

@media (min-width: 820px) {
    .card-body { flex-direction: row; }
}

/* Preview area */
.preview-area {
    flex: 1;
    min-height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
        linear-gradient(45deg, #e5e5ea 25%, transparent 25%),
        linear-gradient(-45deg, #e5e5ea 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e5e5ea 75%),
        linear-gradient(-45deg, transparent 75%, #e5e5ea 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    position: relative;
    padding: 20px;
    border-right: 1px solid var(--border);
}

@media (max-width: 819px) {
    .preview-area { border-right: none; border-bottom: 1px solid var(--border); min-height: 300px; }
}

/* Upload zone */
.upload-zone {
    width: 100%;
    height: 100%;
    min-height: 300px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color var(--transition), background var(--transition);
    gap: 12px;
    padding: 40px 20px;
}
.upload-zone:hover { border-color: var(--accent); background: rgba(0,122,255,0.04); }
.upload-zone.drag-over { border-color: var(--accent); background: rgba(0,122,255,0.08); }
.upload-zone-icon {
    width: 64px;
    height: 64px;
    background: var(--surface-2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}
.upload-zone-icon svg { width: 32px; height: 32px; stroke: var(--text-2); }
.upload-zone p { font-size: 15px; color: var(--text-2); }
.upload-zone .hint { font-size: 12px; color: var(--text-3); }
.upload-zone input[type="file"] { display: none; }

/* Canvas wrapper */
.canvas-wrapper {
    display: none;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.canvas-wrapper.active { display: flex; }

#previewCanvas {
    max-width: 100%;
    max-height: 480px;
    border-radius: 4px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    object-fit: contain;
    background: transparent;
}

/* Image info bar */
.info-bar {
    display: none;
    padding: 10px 20px;
    background: var(--surface-2);
    font-size: 13px;
    color: var(--text-2);
    border-top: 1px solid var(--border);
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}
.info-bar.active { display: flex; }
.info-bar strong { color: var(--text); font-weight: 600; }

/* Controls */
.controls-panel {
    width: 320px;
    flex-shrink: 0;
    padding: 20px 20px;
    display: none;
    flex-direction: column;
    gap: 0;
}
.controls-panel.active { display: flex; }

#controlsContent {
    display: none;
    flex-direction: column;
    gap: 18px;
}

@media (max-width: 819px) {
    .controls-panel { width: 100%; }
}

.control-group { }
.control-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    margin-bottom: 8px;
}
.control-group label .value {
    font-weight: 500;
    color: var(--text);
    font-size: 14px;
}

/* Slider */
input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    transition: background var(--transition);
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transition: transform var(--transition);
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
input[type="range"]::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: none;
}

/* Color row */
.color-row {
    display: flex;
    align-items: center;
    gap: 10px;
}
.color-presets {
    display: flex;
    gap: 6px;
}
.color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color var(--transition), transform var(--transition);
    position: relative;
    flex-shrink: 0;
}
.color-swatch:hover { transform: scale(1.12); }
.color-swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--accent);
}
.color-swatch.has-border { border: 1px solid var(--border); }
.color-picker-wrap {
    position: relative;
    flex-shrink: 0;
}
.color-picker-wrap input[type="color"] {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    padding: 0;
    background: none;
}
.color-picker-wrap input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
.color-picker-wrap input[type="color"]::-webkit-color-swatch {
    border: 1px solid var(--border);
    border-radius: 50%;
}

/* Ratio buttons */
.ratio-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}
.ratio-btn {
    flex: 1 0 0;
    min-width: 48px;
    padding: 8px 4px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    cursor: pointer;
    transition: all var(--transition);
    text-align: center;
    color: var(--text-2);
    line-height: 1.3;
    white-space: nowrap;
}
.ratio-btn:hover { border-color: var(--accent); color: var(--text); }
.ratio-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
}
.ratio-btn .label-small {
    font-size: 9px;
    opacity: 0.6;
    display: block;
    margin-top: 2px;
}

/* Action buttons */
.actions {
    display: flex;
    gap: 10px;
    padding-top: 8px;
}
.btn {
    flex: 1;
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.btn-primary {
    background: var(--accent);
    color: #fff;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--border); }

.btn svg { width: 18px; height: 18px; flex-shrink: 0; }

/* Empty state in controls when no image */
.controls-empty {
    text-align: center;
    padding: 40px 0;
    color: var(--text-3);
    font-size: 13px;
}

/* Footer */
.app-footer {
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-3);
    text-align: center;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1d1d1f;
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.35s ease;
    pointer-events: none;
    z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


/* Language switcher */
.lang-switcher {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-top: 10px;
}
.lang-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-2);
    transition: all var(--transition);
    font-family: inherit;
    line-height: 1.4;
}
.lang-btn:hover { border-color: var(--accent); color: var(--text); }
.lang-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
}

.caption-input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-family:inherit; outline:none; transition:border-color var(--transition),background var(--transition); background:var(--surface-2); color:var(--text); box-sizing:border-box; }
.caption-input:focus { border-color:var(--accent); background:var(--surface); }
.caption-input::placeholder { color:var(--text-3); }
.caption-options { display:flex; gap:10px; margin-top:8px; align-items:flex-start; }
.caption-options .opt-group { flex:1; }
.caption-select { width:100%; padding:6px 8px; border:1px solid var(--border); border-radius:6px; font-size:12px; font-family:inherit; outline:none; background:var(--surface-2); color:var(--text); cursor:pointer; transition:border-color var(--transition); }
.caption-select:focus { border-color:var(--accent); background:var(--surface); }
.caption-options .opt-label { font-size:11px; font-weight:500; color:var(--text-3); margin-bottom:4px; display:block; }

/* Responsive */
@media (max-width: 480px) {
    body { padding: 12px 8px 24px; }
    .app-header h1 { font-size: 22px; }
    .controls-panel { padding: 16px; }
    .preview-area { padding: 12px; min-height: 240px; }
    #previewCanvas { max-height: 320px; }
    .ratio-btn { font-size: 11px; padding: 6px 4px; }
}
</style>

<script>
(function() {
    'use strict';

    // ── State ──
    let originalImg = null;        // HTMLImageElement
    let fileName = '';
    const state = {
        borderWidth: 110,
        borderColor: '#ffffff',
        fillColor: '#ffffff',
        canvasRatio: 'original',
        captionText: '',
        captionFontSize: 144,
        captionColor: '#1c1c1e',
        captionFontFamily: 'system',
        cameraBrand: 'none',
    };

    // ── DOM ──
    const $ = id => document.getElementById(id);
    const fileInput          = $('fileInput');
    const uploadZone         = $('uploadZone');
    const canvasWrapper      = $('canvasWrapper');
    const canvas             = $('previewCanvas');
    const ctx                = canvas.getContext('2d');
    const controlsPanel      = $('controlsPanel');
    const controlsEmpty      = $('controlsEmpty');
    const controlsContent    = $('controlsContent');
    const infoBar            = $('infoBar');
    const infoDimensions     = $('infoDimensions');
    const infoBorder         = $('infoBorder');
    const infoRatio          = $('infoRatio');
    const widthSlider        = $('borderWidth');
    const widthValue         = $('widthValue');
    const captionInput        = $('captionText');
    const captionFontSlider   = $('captionFontSize');
    const captionColorPicker  = $('captionColor');
    const captionFontSelect   = $('captionFont');
    const cameraBrandSelect   = $('cameraBrand');
    const saveTemplateBtn     = $('saveTemplateBtn');
    const templateListEl      = $('templateList');
    const borderPicker       = $('borderColorPicker');
    const fillPicker         = $('fillColorPicker');
    const borderPresets      = $('borderPresets');
    const fillPresets        = $('fillPresets');
    const ratioGroup         = $('ratioGroup');
    const downloadBtn        = $('downloadBtn');
    const resetBtn           = $('resetBtn');
    const toastEl            = $('toast');

    let toastTimer = null;

    // ── Color presets ──
    const BORDER_PRESETS = [
        { label: '纯白', color: '#ffffff' },
        { label: '米白', color: '#f5f0eb' },
        { label: '浅灰', color: '#e8e8e8' },
        { label: '暖白', color: '#fff8f0' },
        { label: '深灰', color: '#8e8e93' },
    ];
    const FILL_PRESETS = [
        { label: '白色', color: '#ffffff' },
        { label: '浅灰', color: '#e8e8e8' },
        { label: '中灰', color: '#aeaeb2' },
        { label: '深灰', color: '#636366' },
        { label: '黑色', color: '#1c1c1e' },
    ];

    // ── Init color presets ──
    function buildPresets(container, presets, onChange) {
        container.innerHTML = '';
        presets.forEach(p => {
            const el = document.createElement('div');
            el.className = 'color-swatch' + (p.color === '#ffffff' ? ' has-border' : '');
            el.style.background = p.color;
            el.title = p.label;
            el.dataset.color = p.color;
            el.addEventListener('click', () => onChange(p.color, el));
            container.appendChild(el);
        });
    }

    let activeBorderSwatch = null;
    let activeFillSwatch = null;

    buildPresets(borderPresets, BORDER_PRESETS, (color, el) => {
        state.borderColor = color;
        borderPicker.value = color;
        if (activeBorderSwatch) activeBorderSwatch.classList.remove('active');
        el.classList.add('active');
        activeBorderSwatch = el;
        render();
    });

    buildPresets(fillPresets, FILL_PRESETS, (color, el) => {
        state.fillColor = color;
        fillPicker.value = color;
        if (activeFillSwatch) activeFillSwatch.classList.remove('active');
        el.classList.add('active');
        activeFillSwatch = el;

    // ── File upload ──
    function loadImage(file) {
        if (!file || !file.type.startsWith('image/')) return;
        fileName = file.name;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                originalImg = img;
                uploadZone.style.display = 'none';
                canvasWrapper.classList.add('active');
                controlsPanel.classList.add("active");
                controlsEmpty.style.display = 'none';
                controlsContent.style.display = 'flex';
                infoBar.classList.add('active');
                render();
                downloadBtn.disabled = false;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) loadImage(e.target.files[0]);
    });

    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();

    // ── Render ──
    function render() {
        if (!originalImg) return;
        const img = originalImg;
        const bw = state.borderWidth;
        const bc = state.borderColor;
        const fc = state.fillColor;
        const ratio = state.canvasRatio;
        const iw = img.naturalWidth;
        const ih = img.naturalHeight;

        const cw = iw + bw * 2;  // content width (image + border)
        const ch = (state.captionText && state.captionText.trim()) || (state.cameraBrand && state.cameraBrand !== 'none') ? ih + bw + Math.max(bw, Math.floor(state.captionFontSize * 1.9 + 24)) : ih + bw * 2;

        let canvasW, canvasH, offX, offY;

        if (ratio === 'original') {
            canvasW = cw;
            canvasH = ch;
            offX = 0;
            offY = 0;
        } else {
            const [rw, rh] = ratio.split(':').map(Number);
            const scale = Math.max(cw / rw, ch / rh);
            canvasW = Math.ceil(rw * scale);
            canvasH = Math.ceil(rh * scale);
            offX = Math.floor((canvasW - cw) / 2);
            offY = Math.floor((canvasH - ch) / 2);
        }


        // Safety cap
        const MAX = 5000;
        let renderScale = 1;
        if (canvasW > MAX || canvasH > MAX) {
            renderScale = Math.min(MAX / canvasW, MAX / canvasH);
        }
        const rW = Math.floor(canvasW * renderScale);
        const rH = Math.floor(canvasH * renderScale);
        const rOffX = Math.floor(offX * renderScale);
        const rOffY = Math.floor(offY * renderScale);
        const rBw = Math.floor(bw * renderScale);

        // HiDPI: match canvas to CSS pixel ratio, but keep it displayable
        const displayScale = Math.min(1, 1200 / Math.max(rW, rH));
        const displayW = Math.floor(rW * (displayScale < 1 ? displayScale : 1));
        const displayH = Math.floor(rH * (displayScale < 1 ? displayScale : 1));

        canvas.width = displayW;
        canvas.height = displayH;

        // Rendering sub-scale from full-res to display
        const s = (displayScale < 1 ? displayScale : 1) * renderScale;
        const sOffX = Math.floor(offX * s);
        const sOffY = Math.floor(offY * s);
        const sBw = Math.floor(bw * s);
        const sCw = Math.floor(cw * s);
        const sCh = Math.floor(ch * s);
        const sIw = Math.floor(iw * s);
        const sIh = Math.floor(ih * s);

        ctx.fillStyle = fc;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = bc;
        ctx.fillRect(sOffX, sOffY, sCw, sCh);
        ctx.drawImage(img, sOffX + sBw, sOffY + sBw, sIw, sIh);

        // Draw caption content: brand logo OR text (mutually exclusive)
        var rHasCap = state.captionText && state.captionText.trim();
        var rHasBrand = state.cameraBrand && state.cameraBrand !== 'none';
        if (rHasCap || rHasBrand) {
            const capTop = sOffY + sBw + sIh;
            const capH = sCh - sBw - sIh;
            if (capH > 4) {
                if (rHasBrand) {
                    // Brand logo centered
                    renderBrandLogo(ctx, state.cameraBrand, sOffX + sCw / 2, capTop + capH / 2, sCw * 0.7, capH * 0.65);
                } else {
                    // Text centered
                    ctx.fillStyle = state.captionColor;
                    const capFs = Math.min(Math.max(Math.floor(state.captionFontSize * (displayScale < 1 ? displayScale : 1) * renderScale), 8), 192);
                    const ff = state.captionFontFamily === 'noto-serif' ? "'Noto Serif SC', 'Source Han Serif SC', serif" : '-apple-system, BlinkMacSystemFont, sans-serif';
                    ctx.font = '600 ' + capFs + 'px ' + ff;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    let text = state.captionText;
                    const maxW = sCw * 0.9;
                    if (ctx.measureText(text).width > maxW) {
                        while (ctx.measureText(text + '…').width > maxW && text.length > 1) {
                            text = text.slice(0, -1);
                        }
                        text += '…';
                    }
                    ctx.fillText(text, sOffX + sCw / 2, capTop + capH / 2);
                }
            }
        }

        // Update info bar
        infoDimensions.textContent = canvasW + ' × ' + canvasH + ' px';
        infoBorder.textContent = bw + ' px';
        const ratioNames = {};
        infoRatio.textContent = ratioNames[ratio] || ratio;
        updateInfoBar();
        const capInfoSpan = document.getElementById('infoCaptionSpan');
        const capInfoText = document.getElementById('infoCaptionText');
        if (state.captionText && state.captionText.trim()) {
            capInfoSpan.style.display = '';
            capInfoText.textContent = state.captionText.length > 18 ? state.captionText.slice(0, 16) + '…' : state.captionText;
        } else {
            capInfoSpan.style.display = 'none';
        }

        // Update hint with file info
        const hint = uploadZone.querySelector('.hint');
        if (hint && fileName) {
            hint.textContent = fileName + ' · ' + iw + '×' + ih;
        }
    }


    // ── Brand logo rendering ──
    function renderBrandLogo(ctx, brand, cx, cy, maxW, maxH) {
        if (!brand || brand === 'none') return;
        var bFs = Math.min(maxH * 0.75, maxW * 0.15);
        if (bFs < 8) return;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        switch (brand) {
            case 'sony':
                ctx.font = 'bold ' + (bFs * 0.65) + 'px Arial, sans-serif';
                ctx.fillStyle = '#000'; ctx.fillText('SONY', cx, cy);
                break;
            case 'nikon':
                ctx.font = 'bold ' + (bFs * 0.75) + 'px Arial, sans-serif';
                ctx.fillStyle = '#1A1A1A'; ctx.fillText('Nikon', cx, cy);
                ctx.fillStyle = '#FFE200';
                ctx.fillRect(cx - bFs * 0.65, cy + bFs * 0.35, bFs * 1.3, bFs * 0.06);
                break;
            case 'canon':
                ctx.font = 'italic bold ' + bFs + 'px Times, serif';
                ctx.fillStyle = '#CC0000'; ctx.fillText('Canon', cx, cy);
                break;
            case 'fujifilm':
                ctx.font = 'bold ' + (bFs * 0.55) + 'px Arial, sans-serif';
                ctx.fillStyle = '#00A650'; ctx.fillText('FUJIFILM', cx, cy);
                break;
            case 'leica':
                ctx.font = 'bold ' + (bFs * 0.7) + 'px Arial, sans-serif';
                ctx.fillStyle = '#1A1A1A'; ctx.fillText('Leica', cx - bFs * 0.15, cy);
                ctx.fillStyle = '#E31E24';
                ctx.beginPath(); ctx.arc(cx + bFs * 0.45, cy, bFs * 0.1, 0, Math.PI * 2); ctx.fill();
                break;
            case 'panasonic':
                ctx.font = 'bold ' + (bFs * 0.5) + 'px Arial, sans-serif';
                ctx.fillStyle = '#003DA6'; ctx.fillText('Panasonic', cx, cy);
                break;
            case 'olympus':
                ctx.font = 'bold ' + (bFs * 0.45) + 'px Arial, sans-serif';
                ctx.fillStyle = '#E60012'; ctx.fillText('OM SYSTEM', cx, cy);
                break;
            case 'ricoh':
                ctx.font = 'bold ' + (bFs * 0.6) + 'px Arial, sans-serif';
                ctx.fillStyle = '#CC0000'; ctx.fillText('RICOH', cx, cy);
                break;
            case 'xiaomi':
                ctx.font = 'bold ' + (bFs * 0.7) + 'px Arial, sans-serif';
                ctx.fillStyle = '#FF6900'; ctx.fillText('Xiaomi', cx, cy);
                break;
            case 'huawei':
                ctx.font = 'bold ' + (bFs * 0.65) + 'px Arial, sans-serif';
                ctx.fillStyle = '#CF0A2C'; ctx.fillText('HUAWEI', cx, cy);
                break;
        }
    }

    // ── Template functions ──
    function getTemplates() {
        try { return JSON.parse(localStorage.getItem('framit_templates') || '[]'); } catch(e) { return []; }
    }
    function saveTemplates(list) {
        try { localStorage.setItem('framit_templates', JSON.stringify(list)); } catch(e) {}
    }
    function saveTemplate() {
        var name = prompt(getI18n().templateSavePrompt || 'Save as template:');
        if (!name || !name.trim()) return;
        var t = {
            name: name.trim(),
            borderWidth: state.borderWidth,
            borderColor: state.borderColor,
            fillColor: state.fillColor,
            canvasRatio: state.canvasRatio,
            captionText: state.captionText,
            captionFontSize: state.captionFontSize,
            captionColor: state.captionColor,
            captionFontFamily: state.captionFontFamily,
            cameraBrand: state.cameraBrand,
        };
        var list = getTemplates();
        list.push(t);
        saveTemplates(list);
        renderTemplateList();
        showToast(getI18n().templateSaved || 'Template saved ✓');
    }
    function loadTemplate(t) {
        state.borderWidth = t.borderWidth;
        state.borderColor = t.borderColor;
        state.fillColor = t.fillColor;
        state.canvasRatio = t.canvasRatio;
        state.captionText = t.captionText || '';
        state.captionFontSize = t.captionFontSize || 30;
        state.captionColor = t.captionColor || '#1c1c1e';
        state.captionFontFamily = t.captionFontFamily || 'system';
        state.cameraBrand = t.cameraBrand || 'none';
        widthSlider.value = state.borderWidth;
        widthValue.textContent = state.borderWidth + ' px';
        captionInput.value = state.captionText;
        captionFontSlider.value = state.captionFontSize;
        captionColorPicker.value = state.captionColor;
        captionFontSelect.value = state.captionFontFamily;
        cameraBrandSelect.value = state.cameraBrand;
        borderPicker.value = state.borderColor;
        fillPicker.value = state.fillColor;
        ratioGroup.querySelectorAll('.ratio-btn').forEach(function(b) {
            b.classList.toggle('active', b.dataset.ratio === state.canvasRatio);
        });
        render();
        showToast(getI18n().templateLoaded || 'Template loaded ✓');
    }
    function deleteTemplate(index) {
        var list = getTemplates();
        list.splice(index, 1);
        saveTemplates(list);
        renderTemplateList();
    }
    function renderTemplateList() {
        var list = getTemplates();
        if (list.length === 0) { templateListEl.classList.remove('active'); return; }
        templateListEl.classList.add('active');
        var header = templateListEl.querySelector('.template-list-header');
        templateListEl.innerHTML = '';
        if (header) templateListEl.appendChild(header);
        else {
            var h = document.createElement('div');
            h.className = 'template-list-header';
            h.style.cssText = 'font-size:11px;color:var(--text-3);margin:4px 0 2px;font-weight:500;';
            h.setAttribute('data-i18n', 'savedTemplates');
            h.textContent = getI18n().savedTemplates || 'Saved Templates';
            templateListEl.appendChild(h);
        }
        list.forEach(function(t, i) {
            var item = document.createElement('div');
            item.className = 'template-item';
            var nameSpan = document.createElement('span');
            nameSpan.className = 'template-item-name';
            nameSpan.textContent = t.name;
            item.appendChild(nameSpan);
            var loadBtn = document.createElement('button');
            loadBtn.className = 'template-item-btn tpl-load';
            loadBtn.textContent = getI18n().templateLoad || 'Load';
            loadBtn.addEventListener('click', function() { loadTemplate(t); });
            item.appendChild(loadBtn);
            var delBtn = document.createElement('button');
            delBtn.className = 'template-item-btn tpl-del';
            delBtn.textContent = '✕';
            delBtn.title = getI18n().templateDelete || 'Delete';
            delBtn.addEventListener('click', function() { deleteTemplate(i); });
            item.appendChild(delBtn);
            templateListEl.appendChild(item);
        });
    }

// ── Caption events ──

    // ── Download ──
    downloadBtn.addEventListener('click', () => {
        if (!originalImg) return;
        downloadBtn.disabled = true;
        downloadBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> ' + getI18n().downloading;

        // Render at full resolution in an offscreen canvas
        const img = originalImg;
        const bw = state.borderWidth;
        const bc = state.borderColor;
        const fc = state.fillColor;
        const ratio = state.canvasRatio;
        const iw = img.naturalWidth;
        const ih = img.naturalHeight;

        const cw = iw + bw * 2;
        var isCaption = (state.captionText && state.captionText.trim()) || (state.cameraBrand && state.cameraBrand !== 'none');
        const ch = isCaption ? ih + bw + Math.max(bw, Math.floor(state.captionFontSize * 1.9 + 24)) : ih + bw * 2;

        let outW, outH, offX, offY;
        if (ratio === 'original') {
            outW = cw;
            outH = ch;
            offX = 0;
            offY = 0;
        } else {
            const [rw, rh] = ratio.split(':').map(Number);
            const scale = Math.max(cw / rw, ch / rh);
            outW = Math.ceil(rw * scale);
            outH = Math.ceil(rh * scale);
            offX = Math.floor((outW - cw) / 2);
            offY = Math.floor((outH - ch) / 2);
        }

        const MAX_OUT = 5000;
        let outScale = 1;
        if (outW > MAX_OUT || outH > MAX_OUT) {
            outScale = Math.min(MAX_OUT / outW, MAX_OUT / outH);
        }
        const fW = Math.floor(outW * outScale);
        const fH = Math.floor(outH * outScale);
        const fOffX = Math.floor(offX * outScale);
        const fOffY = Math.floor(offY * outScale);
        const fBw = Math.floor(bw * outScale);
        const fIw = Math.floor(iw * outScale);
        const fIh = Math.floor(ih * outScale);

        // Use requestAnimationFrame to let the UI update first
        requestAnimationFrame(() => {
            const offCanvas = document.createElement('canvas');
            offCanvas.width = fW;
            offCanvas.height = fH;
            const offCtx = offCanvas.getContext('2d');

            offCtx.fillStyle = fc;
            offCtx.fillRect(0, 0, fW, fH);
            offCtx.fillStyle = bc;
            offCtx.fillRect(fOffX, fOffY, fIw + fBw * 2, isCaption ? fIh + fBw + Math.max(fBw, Math.floor(state.captionFontSize * outScale * 1.9 + 24 * outScale)) : fIh + fBw * 2);
            offCtx.drawImage(img, fOffX + fBw, fOffY + fBw, fIw, fIh);

            // Caption content inside bottom border area (download): brand OR text
            var dlHasCap = state.captionText && state.captionText.trim();
            var dlHasBrand = state.cameraBrand && state.cameraBrand !== 'none';
            if (dlHasCap || dlHasBrand) {
                const capTop = fOffY + fBw + fIh;
                const capH = isCaption ? Math.max(fBw, Math.floor(state.captionFontSize * outScale * 1.9 + 24 * outScale)) : fBw;
                if (capH > 4) {
                    if (dlHasBrand) {
                        // Brand logo centered
                        renderBrandLogo(offCtx, state.cameraBrand, fOffX + (fIw + fBw * 2) / 2, capTop + capH / 2, (fIw + fBw * 2) * 0.7, capH * 0.65);
                    } else if (dlHasCap) {
                        // Text centered
                        offCtx.fillStyle = state.captionColor;
                        var capFs = Math.min(Math.max(Math.floor(state.captionFontSize * outScale), 10), 192);
                        var dlFontFamily = state.captionFontFamily === 'noto-serif' ? "'Noto Serif SC', 'Source Han Serif SC', serif" : '-apple-system, BlinkMacSystemFont, sans-serif';
                        offCtx.font = '600 ' + capFs + 'px ' + dlFontFamily;
                        offCtx.textAlign = 'center';
                        offCtx.textBaseline = 'middle';
                        var dlText2 = state.captionText;
                        var dlMaxW2 = (fIw + fBw * 2) * 0.9;
                        if (offCtx.measureText(dlText2).width > dlMaxW2) {
                            while (offCtx.measureText(dlText2 + '…').width > dlMaxW2 && dlText2.length > 1) {
                                dlText2 = dlText2.slice(0, -1);
                            }
                            dlText2 += '…';
                        }
                        offCtx.fillText(dlText2, fOffX + (fIw + fBw * 2) / 2, capTop + capH / 2);
                    }
                }
            }

            // Trigger download
            const link = document.createElement('a');
            const baseName = fileName.replace(/\.[^.]+$/, '') || 'photo';
            link.download = baseName + '_framed.png';
            link.href = offCanvas.toDataURL('image/png');
            link.click();

            downloadBtn.disabled = false;
            downloadBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> ' + getI18n().downloadBtn;

            showToast(getI18n().downloaded);
        });
    });

    // ── Toast ──
    function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastTimer);

    }

    // ── Handle paste (bonus) ──
    document.addEventListener('paste', (e) => {
        const items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        for (const item of items) {
            if (item.type.startsWith('image/')) {
                const file = item.getAsFile();
                if (file) { loadImage(file); break; }
            }
        }
    });

    let currentLang = 'zh';

    function getI18n() { return i18n[currentLang]; }

    function applyLanguage(lang) {
        currentLang = lang || 'zh';
        const t = getI18n();
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            if (t[key] !== undefined) {
                el.textContent = t[key];
            }
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.dataset.i18nPlaceholder;
            if (t[key] !== undefined) {
                el.placeholder = t[key];
            }
        });
        document.querySelectorAll('[data-i18n-optlabel]').forEach(el => {
            const key = el.dataset.i18nOptlabel;
            if (t[key] !== undefined) {
                el.textContent = t[key];
            }
        });
        rebuildColorPresets();
        if (originalImg) updateInfoBar();
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.lang === currentLang);
        });
        try { localStorage.setItem('framit_lang', currentLang); } catch(e) {}
    }

    function rebuildColorPresets() {
        const t = getI18n();
        const borderSwatches = borderPresets.querySelectorAll('.color-swatch');
        if (t.borderPresets) {
            borderSwatches.forEach((el, i) => {
                if (t.borderPresets[i]) el.title = t.borderPresets[i];
            });
        }
        const fillSwatches = fillPresets.querySelectorAll('.color-swatch');
        if (t.fillPresets) {
            fillSwatches.forEach((el, i) => {
                if (t.fillPresets[i]) el.title = t.fillPresets[i];
            });
        }
    }

    function updateInfoBar() {
        const t = getI18n();
        const rn = {
            'original': t.originalName,
            '1:1': t.squareName,
            '4:5': t.portraitName,
            '16:9': t.landscapeName,
            '9:16': t.fullName,
        };
        infoRatio.textContent = rn[state.canvasRatio] || state.canvasRatio;
    }

    function initLanguage() {
        let lang = 'zh';
        try {
            const saved = localStorage.getItem('framit_lang');
            if (saved && i18n[saved]) lang = saved;
        } catch(e) {}
        const browserLang = (navigator.language || '').slice(0, 2);
        if (!localStorage.getItem('framit_lang') && i18n[browserLang]) lang = browserLang;
        applyLanguage(lang);
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => applyLanguage(btn.dataset.lang));
        });
    }
    // ── End i18n ──

    // ── Init ──
    // Disable download button initially
    downloadBtn.disabled = true;
    initLanguage();

    console.log('FrameIt ready ✓');
})();
